    <style>

	/* Layout principal em duas colunas */
.layout {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 200px;
  background-color: #9AB6DE;
  padding-top: 60px;
  transition: width 0.3s ease;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}

.sidebar.collapsed {
  width: 60px;
}

.sidebar a {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  text-decoration: none;
  font-size: 18px;
  color: #fff;
  white-space: nowrap;
  transition: background-color 0.2s;
}

.sidebar a:hover {
  background-color: #575757;
}

.sidebar a span:first-child {
  width: 30px;
  text-align: center;
}

.sidebar .link-text {
  opacity: 1;
  transition: opacity 0.2s ease;
}

.sidebar.collapsed .link-text {
  opacity: 0;
  pointer-events: none;
  width: 0;
  overflow: hidden;
}

/* Conteúdo principal */
main {
  flex: 1;
  padding: 20px;
  transition: margin-left 0.3s ease;
  overflow-y: auto;
}

/* Botão para abrir sidebar */
.openbtn {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1100;
  font-size: 20px;
  cursor: pointer;
  background-color: #9AB6DE;
  color: white;
  padding: 10px 15px;
  border: none;
}

		
	body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
    }
    header {
      background: #9AB6DE;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    nav {
      background: #34495e;
      padding: 0.5rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
    }
    nav a {
      margin: 0 1em;
      text-decoration: none;
      color: white;
      font-weight: bold;
    }
    nav a:hover {
      text-decoration: underline;
    }
    main {
      padding: 2em;
    }
    input[type="text"], select {
      padding: 0.5em;
      margin: 0.5em 0;
      width: 200px;
    }
  

.tracker-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.55fr) minmax(340px, 0.95fr);
  gap: 24px;
  align-items: start;
}
.tracker-list-card,
.tracker-panel-card {
  background: #fff;
  border: 1px solid #e4e8ee;
  border-radius: 16px;
  box-shadow: 0 10px 24px rgba(16,16,16,0.06);
}
.tracker-list-card { padding: 20px; }
.tracker-panel-card { padding: 20px; position: sticky; top: 24px; }
.table-wrap {
  max-height: calc(100vh - 320px);
  overflow: auto;
  border: 1px solid #edf1f5;
  border-radius: 12px;
}
#tabela-atividades thead th {
  position: sticky;
  top: 0;
  background: #fff;
  z-index: 1;
}
#tabela-atividades tbody tr.table-active > * {
  box-shadow: inset 0 0 0 9999px rgba(154, 182, 222, 0.18);
}
.selection-placeholder {
  border: 1px dashed #d6dee8;
  border-radius: 14px;
  padding: 28px 18px;
  text-align: center;
  color: #6c757d;
  background: linear-gradient(180deg, #fbfdff 0%, #f6f9fc 100%);
}
.selection-placeholder i {
  font-size: 2rem;
  display: block;
  margin-bottom: 10px;
  color: #9AB6DE;
}
.review-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  border-radius: 999px;
  padding: 6px 10px;
  border: 1px solid #d9e3f0;
  background: #f8fbff;
  color: #335;
}
.panel-section { margin-bottom: 14px; }
.panel-label {
  display: block;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #6c757d;
  margin-bottom: 6px;
}
.panel-value { white-space: pre-wrap; word-break: break-word; }
.panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.panel-grid .full { grid-column: 1 / -1; }
#acoes .alert { margin-bottom: 0; }
#acoes textarea { min-height: 120px; resize: vertical; }
#acoes .btn { margin-right: 8px; margin-bottom: 8px; }
@media (max-width: 1200px) {
  .tracker-grid { grid-template-columns: 1fr; }
  .tracker-panel-card { position: static; }
  .table-wrap { max-height: none; }
}
@media (max-width: 768px) {
  .panel-grid { grid-template-columns: 1fr; }
}

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { getLoggedUser, getUserData, carregarDadosUsuario } from "./user-info.js";

const supabase = createClient('https://qnxvprptwczutzojjyve.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFueHZwcnB0d2N6dXR6b2pqeXZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM3MzIxMjAsImV4cCI6MjA2OTMwODEyMH0.oBi3ZBvEIBUzsaAPvYRJIhAZlJuetYVMcxFTRs_gBio');
let tabelaAtual = 'selected';
let currentUser = null;
let currentUserData = null;
let selectedRowId = null;

async function initTracker() {
  currentUser = await getLoggedUser();
  if (!currentUser) {
    window.location.href = 'login.html';
    return;
  }

  currentUserData = await getUserData(currentUser.email);
  if (!currentUserData) return;

  await carregarDadosUsuario();
  bindEvents();
  await fetchData();
}

function bindEvents() {
  document.getElementById('btnSelectedIdeas').addEventListener('click', async () => {
    tabelaAtual = 'selected';
    updateSourceButtons();
    resetFilters();
    clearSelection();
    await fetchData();
  });

  document.getElementById('btnMySubmissions').addEventListener('click', async () => {
    tabelaAtual = 'submitted';
    updateSourceButtons();
    resetFilters();
    clearSelection();
    await fetchData();
  });

  document.getElementById('filter-category').addEventListener('change', applyFilters);
  document.getElementById('filter-status').addEventListener('change', applyFilters);
  document.getElementById('filter-location').addEventListener('change', applyFilters);

  const logoutBtn = document.getElementById('logoutBtn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', async () => {
      const { error } = await supabase.auth.signOut();
      if (error) {
        console.error('Erro ao fazer logout:', error.message);
      } else {
        alert('Logout realizado com sucesso!');
        window.location.href = 'login.html';
      }
    });
  }
}

function updateSourceButtons() {
  document.getElementById('btnSelectedIdeas').classList.toggle('active', tabelaAtual === 'selected');
  document.getElementById('btnMySubmissions').classList.toggle('active', tabelaAtual === 'submitted');
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filter-category').innerHTML = '<option value="">All</option>';
  document.getElementById('filter-status').innerHTML = '<option value="">All</option>';
  document.getElementById('filter-location').innerHTML = '<option value="">All</option>';
}

function clearSelection() {
  selectedRowId = null;
  document.getElementById('selection-placeholder').style.display = 'block';
  document.getElementById('detalhes-pratica').style.display = 'none';
  document.querySelectorAll('#tabela-atividades tbody tr.main-row').forEach(row => row.classList.remove('table-active'));
}

function markSelectedRow(id) {
  document.querySelectorAll('#tabela-atividades tbody tr.main-row').forEach(row => {
    row.classList.toggle('table-active', row.getAttribute('data-id') === String(id));
  });
}

async function fetchData() {
  let query;
  if (tabelaAtual === 'selected') {
    query = supabase.from('atividades_selecionadas').select('*').eq('imp_plant', currentUserData.site_region);
  } else {
    query = supabase.from('submissions').select('*').eq('responsible', currentUser.email);
  }

  const { data, error } = await query;
  if (error) {
    console.error('Erro ao buscar dados:', error.message);
    return;
  }

  renderTable(data || []);
}

function renderTable(data) {
  const tbody = document.querySelector('#tabela-atividades tbody');
  tbody.innerHTML = '';
  clearSelection();

  const categories = new Set();
  const statuses = new Set();
  const locations = new Set();

  data.forEach(item => {
    const mainRow = document.createElement('tr');
    mainRow.classList.add('clickable-row');
    mainRow.style.cursor = 'pointer';
    mainRow.setAttribute('data-id', item.id || '');

    const site = item.imp_plant || item.region_plant || '';
    const localResponsible = item.ImpResp || item.responsible || '';
    const type = item.type || (tabelaAtual === 'selected' ? 'Implementation Portfolio' : 'Best Practice Submission');
    const fileCell = item.file_url ? `<a href="${item.file_url}" target="_blank">Download</a>` : 'No file';
    const actionCell = tabelaAtual === 'selected'
      ? `<button class="btn btn-primary btn-sm" title="Delete" onclick="removerAtividade(this); event.stopPropagation();"><i class="bi bi-x-lg"></i></button>`
      : '<span class="text-muted">—</span>';

    mainRow.innerHTML = `
      <td>${item.title || ''}</td>
      <td>${site}</td>
      <td>${localResponsible}</td>
      <td>${item.category || ''}</td>
      <td>${item.status || ''}</td>
      <td>${type}</td>
      <td>${fileCell}</td>
      <td>${actionCell}</td>
    `;

    mainRow.classList.add('main-row');

    mainRow.addEventListener('click', (e) => {
      if (e.target.tagName.toLowerCase() === 'button' || e.target.closest('button') || e.target.tagName.toLowerCase() === 'a') return;
      if (selectedRowId === item.id) {
        clearSelection();
        return;
      }
      selectedRowId = item.id;
      markSelectedRow(item.id);
      mostrarDetalhes(item);
    });

    tbody.appendChild(mainRow);

    if (item.category) categories.add(item.category);
    if (item.status) statuses.add(item.status);
    if (site) locations.add(site);
  });

  populateFilter('filter-category', categories);
  populateFilter('filter-status', statuses);
  populateFilter('filter-location', locations);
  applyFilters();
}

function populateFilter(id, values) {
  const select = document.getElementById(id);
  Array.from(values).sort().forEach(value => {
    const option = document.createElement('option');
    option.value = value;
    option.textContent = value;
    select.appendChild(option);
  });
}

function applyFilters() {
  const category = document.getElementById('filter-category').value;
  const status = document.getElementById('filter-status').value;
  const location = document.getElementById('filter-location').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  const rows = document.querySelectorAll('#tabela-atividades tbody tr.main-row');
  rows.forEach(mainRow => {
    const cells = mainRow.querySelectorAll('td');
    const text = Array.from(cells).map(cell => cell.textContent.toLowerCase()).join(' ');
    const cat = cells[3]?.textContent || '';
    const stat = cells[4]?.textContent || '';
    const loc = cells[1]?.textContent || '';

    const show = (!search || text.includes(search)) &&
                 (!category || cat === category) &&
                 (!status || stat === status) &&
                 (!location || loc === location);

    mainRow.style.display = show ? '' : 'none';
    if (!show && selectedRowId !== null && mainRow.getAttribute('data-id') === String(selectedRowId)) {
      clearSelection();
    }
  });
}

window.filterTable = applyFilters;

window.removerAtividade = async function(botao) {
  const linha = botao.closest('tr');
  const id = linha.getAttribute('data-id');

  const { error } = await supabase.from('atividades_selecionadas').delete().eq('id', id);
  if (error) {
    console.error('Erro ao remover:', error.message);
    alert('Error removing best practice');
  } else {
    alert('Best Practice removed!');
    clearSelection();
    await fetchData();
  }
};

window.mostrarDetalhes = function(item) {
  document.getElementById('detalhe-title').innerText = item.title || '';
  document.getElementById('selection-placeholder').style.display = 'none';
  document.getElementById('detalhe-category').innerText = item.category || '';
  document.getElementById('detalhe-desc').innerText = item.description || '';
  document.getElementById('detalhe-steps').innerText = item.steps || '';
  document.getElementById('detalhe-region_plant').innerText = item.imp_plant || item.region_plant || '';
  document.getElementById('detalhe-responsible').innerText = item.ImpResp || item.responsible || '';
  document.getElementById('detalhe-status').innerText = item.status || '';
  document.getElementById('detalhe-comentario').innerText = item.comments || item.auditor_comment || '';

  const acoes = document.getElementById('acoes');
  acoes.innerHTML = '';

  if (tabelaAtual === 'selected') {
    if ((item.status || '').toLowerCase() !== 'in process') {
      acoes.innerHTML = `<button class="btn btn-success" onclick="iniciarImplementacao(${item.id})">Implement</button>`;
    } else {
      acoes.innerHTML = `
        <div class="mb-3">
          <label>Comments:</label>
          <textarea id="comentarios-${item.id}" class="form-control" rows="3" placeholder="Write here..."></textarea>
        </div>
        <div class="mb-3">
          <label>Files:</label>
          <input id="anexo-${item.id}" type="file" class="form-control">
        </div>
        <button class="btn btn-primary" onclick="submeterImplementacao(${item.id})">Submit</button>
        <button class="btn btn-secondary" onclick="cancelaImplementacao(${item.id})">Cancel</button>
      `;
    }
  } else {
    acoes.innerHTML = `<div class="alert alert-light border">This section shows all ideas submitted by the logged-in user.</div>`;
  }

  const extraMeta = document.getElementById('detalhe-extra-meta');
  if (extraMeta) extraMeta.remove();
  const metaWrap = document.createElement('div');
  metaWrap.id = 'detalhe-extra-meta';
  metaWrap.className = 'panel-grid mt-2';
  metaWrap.innerHTML = `
    <div class="panel-section full">
      <span class="panel-label">Applicability</span>
      <div class="panel-value">${item.applicability || 'None'}</div>
    </div>
    <div class="panel-section full">
      <span class="panel-label">Functional Area</span>
      <div class="panel-value">${item.functional_area || 'None'}</div>
    </div>
  `;
  document.getElementById('acoes').before(metaWrap);

  document.getElementById('detalhes-pratica').style.display = 'block';
};

window.iniciarImplementacao = async function(id) {
  const { error } = await supabase.from('atividades_selecionadas').update({ status: 'In Process' }).eq('id', id);
  if (error) {
    alert('Erro ao iniciar implementação.');
  } else {
    alert('Implementation Started!');
    clearSelection();
    await fetchData();
  }
};

window.cancelaImplementacao = async function(id) {
  const { error } = await supabase.from('atividades_selecionadas').update({ status: 'Aborted' }).eq('id', id);
  if (error) {
    alert('Erro ao cancelar implementação.');
  } else {
    alert('Cancelled!');
    clearSelection();
    await fetchData();
  }
};

window.submeterImplementacao = async function(id) {
  const comentarios = document.getElementById(`comentarios-${id}`).value;
  const arquivo = document.getElementById(`anexo-${id}`).files[0];
  const type = 'Implementation Submission';
  let fileUrl = null;

  if (arquivo) {
    const fileName = `${Date.now()}_${arquivo.name}`;
    const { error: uploadError } = await supabase.storage.from('implementfiles').upload(fileName, arquivo);
    if (uploadError) {
      alert('Erro ao enviar arquivo: ' + uploadError.message);
      return;
    }
    const { data } = supabase.storage.from('implementfiles').getPublicUrl(fileName);
    fileUrl = data.publicUrl;
  }

  const { error } = await supabase
    .from('atividades_selecionadas')
    .update({ comments: comentarios, file_url: fileUrl, status: 'Submitted', type: type })
    .eq('id', id);

  if (error) {
    alert('Erro ao salvar implementação: ' + error.message);
  } else {
    alert('Implementation Submitted!');
    clearSelection();
    await fetchData();
  }
};

initTracker();
</script>
